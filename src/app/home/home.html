
@if (popularProductList()) {
	<ngb-carousel>
		@for(item of popularProductList(); track item.id)
		{
			<ng-template ngbSlide>
				<div class="picsum-img-wrapper">
					<img src="{{item.image}}" class="product-header-img" alt="Random first slide" />
				</div>
				<div class="carousel-caption">
					<h3>{{item.name}}</h3>
					<p>{{item.description}}</p>
				</div>
			</ng-template>
		}
	</ngb-carousel>
}
<div class="product-list-wrapper">
	<h1>Trendy Products</h1>
	<div class="row">
		@for( item of trendyProducts(); track item.id)
		{
			<div class="col-sm-3">
				<div class="prodct-item">
					<img src="{{item.image}}">
					<div class="product-details">
						<h6 class="name-head">{{item.name}}</h6>
						<div class="product-price">
							<h6>Price: {{item.price}}</h6>
						</div>
						<div class="product-color">
							<h6>Color: {{item.color}}</h6>
						</div>
					</div>
					<div class="product-footer">
						<a href="">View Details</a>
						<a href="">Add To Cart</a>
					</div>
				</div>
			</div>
		}
	</div>
</div>
